<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Ctrl+Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange-ctrl: #FF6B00;
            --blue-ctrl: #5988ff;
            --white: #FFFFFF;
            --gray-light: #F4F4F4;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--blue-ctrl);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #meu-formulario {
            background-color: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 8px solid var(--orange-ctrl);
        }

        .logo-placeholder {
            text-align: center;
            font-weight: 600;
            font-size: 24px;
            color: var(--orange-ctrl);
            margin-bottom: 10px;
        }

        .logo-placeholder span { color: var(--blue-ctrl); }

        .info-evento {
            text-align: center;
            background-color: #f0f4ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #333;
            line-height: 1.5;
            border-left: 4px solid var(--orange-ctrl);
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0 20px 0;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            background-color: var(--orange-ctrl);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        label {
            font-size: 14px;
            color: var(--blue-ctrl);
            font-weight: 600;
        }

        /* --- ESTILOS DOS MODAIS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
            width: 80%;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Spinner de Carregamento */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--orange-ctrl);
            border-right: 5px solid var(--blue-ctrl);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-icon { font-size: 50px; margin-bottom: 20px; display: block; }
        .modal-content h2 { color: var(--blue-ctrl); margin-top: 0; font-size: 20px; }
        .btn-modal { background-color: var(--blue-ctrl); margin-top: 20px; }

    </style>
</head>
<body>

<div id="meu-formulario">
    <div class="logo-placeholder">Ctrl+<span>Day</span></div>
    <div class="info-evento">
        <strong>🎨 Competição Artística Ctrl+Play</strong>
        Leia o <a href="index.html">Regulamento</a> antes da Inscrição!
    </div>
    
    <form id="form-inscricao">
       <label for="responsavel">Nome do Responsável</label>
        <input type="text" name="Responsavel" id="responsavel" placeholder="Ex: Camila Guimarães" required>

        <label for="email">Email do Responsável</label>
        <input type="email" name="Email" id="email" placeholder="Ex: camila@email.com" required>

        <label for="telefone">Telefone do Responsável</label>
        <input type="tel" name="Telefone" id="telefone" placeholder="(00) 00000-0000" required>
        
        <label for="aluno">Nome do Aluno</label>
        <input type="text" name="Aluno" id="aluno" placeholder="Ex: Ricardo Sales" required>
        
        <label for="modulo">Módulo do Aluno</label>
        <select name="Modulo" id="modulo" required>
            <option value="" disabled selected>Selecione o módulo</option>
            <option value="Kids">Kids 6-9 anos</option>
            <option value="Teens">Teens 10-13 anos</option>
            <option value="Young">Young 14-18 anos</option>
        </select>
        
        <button type="submit" id="submit">Quero Participar!</button>
    </form>
</div>

<!-- MODAL DE CARREGANDO -->
<div id="modal-loading" class="modal-overlay">
    <div class="modal-content">
        <div class="loader"></div>
        <h2>Enviando sua Inscrição...</h2>
        <p>Por favor, aguarde um momento.</p>
    </div>
</div>

<!-- MODAL DE RESULTADO (SUCESSO/ERRO) -->
<div id="modal-result" class="modal-overlay">
    <div class="modal-content">
        <span id="result-icon" class="modal-icon"></span>
        <h2 id="result-title"></h2>
        <p id="result-message"></p>
        <button type="button" class="btn-modal" onclick="closeModal()">Entendido!</button>
    </div>
</div>

<script>
    // Máscara de Telefone
    const telInput = document.getElementById('telefone');
    telInput.addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbHzTcJSpzpd3SCkNTTcXlBZtVy_KF28wHHo4_Fixa2jKA2Yw9qr2o7JbjfO0NliHz/exec';
    const form = document.getElementById('form-inscricao');
    const modalLoading = document.getElementById('modal-loading');
    const modalResult = document.getElementById('modal-result');

    function showResult(title, message, icon) {
        modalLoading.style.display = 'none'; // Fecha o loading
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-message').innerText = message;
        document.getElementById('result-icon').innerText = icon;
        modalResult.style.display = 'flex';
    }

    function closeModal() {
        modalResult.style.display = 'none';
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Exibe o modal de carregamento
        modalLoading.style.display = 'flex';
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                showResult('Inscrição Confirmada!', 'Tudo certo! Recebemos seus dados. Prepare os pincéis (ou o mouse)!', '🚀');
                form.reset();
            })
            .catch(error => {
                console.error('Erro!', error.message);
                showResult('Houve um problema', 'Não conseguimos enviar seus dados agora. Verifique sua conexão.', '❌');
            });
    });
</script>

</body>
</html>
